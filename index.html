<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görev Yönetim Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .resim { width: 95%; max-width: 300px; margin-top: 10px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); text-align: center; }
        .container { width: 95%; max-width: 600px; margin-top: 150px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 20px; font-size: 24px; }
        .input-group { 
        display: flex; 
        flex-direction: column; 
        gap: 15px; 
        text-align: left; /* Etiketlerin sola yaslanması için */
    }
    label { 
        font-weight: bold; 
        color: #34495e; 
        margin-bottom: -10px; 
        font-size: 14px; 
        margin-left: 5px;
    }
    input { padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; }
        input:focus { border-color: #ff6d5a; outline: none; }
        button { padding: 15px; background-color: #ff6d5a; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #e85a49; }
        button:disabled { background-color: #ccc; }
        .info { margin-top: 20px; font-size: 0.85em; color: #340911; }
        #statusMsg { margin-top: 15px; font-weight: bold; color: #27ae60; display: none; }
    </style>
</head>
<body>
<!--
<div class="resim">
    <img src="IMG_8716.jpeg" alt="Foto" width="300" height="200">
</div>
-->
    <div class="container">
        <h1>📋 Yeni Görev Tanımlama</h1>
        <div class="input-group">
            <label for="taskInput">Görev Açıklaması</label>
        <input type="text" id="taskInput" placeholder="Örn: Mutfak temizliği">

        <label for="basTarihInput">Başlangıç Tarihi</label>
        <input type="date" id="basTarihInput">

        <label for="bitTarihInput">Bitiş Tarihi</label>
        <input type="date" id="bitTarihInput">

        <label for="kisiInput">Sorumlu Kişi</label>
        <input type="text" id="kisiInput" placeholder="İsim giriniz...">

        <label for="yerInput">Yer / Mekan</label>
        <input type="text" id="yerInput" placeholder="Örn: Ev, Ofis, Bahçe">

        <label for="epostaInput">E-posta Adresi</label>
        <input type="email" id="epostaInput" value="alpaltugozel@gmail.com" placeholder="ornek@mail.com">

        <button onclick="gorevKaydet()" id="submitBtn">Görevi Sisteme Kaydet</button>
    </div>
    <p id="statusMsg">✅ Görev başarıyla kaydedildi!</p>
    </div>

    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
        
        createChat({
            webhookUrl: 'https://pond-virtual-blair-packaging.trycloudflare.com/webhook/05903637-f70b-45b0-86b3-e24c0f641cb3/chat',
            webhookConfig: {
                method: 'POST',
                headers: {
                    'ngrok-skip-browser-warning': 'true'
                }
            },
            showWelcomeScreen: false,
            initialMessages: [
                'Merhaba! 👋',
                'Ben ev içi görev asistanıyım. Sorularınızı sorabilirsiniz.'
            ],
            i18n: {
                en: {
                    title: 'Asistan 👋',
                    subtitle: "Size nasıl yardımcı olabilirim?",
                    inputPlaceholder: 'Sorunuzu yazın...',
                    getStarted: 'Yeni Sohbet'
                },
            }
        });
    </script>

    <script>
        // OTOMATİK TARİH AKTARMA: Başlangıç tarihi değişince bitişe kopyala
    const basTarihInput = document.getElementById('basTarihInput');
    const bitTarihInput = document.getElementById('bitTarihInput');

    basTarihInput.addEventListener('change', function() {
        // Eğer bitiş tarihi henüz seçilmemişse veya başlangıçtan önceyse otomatik güncelle
        if (basTarihInput.value) {
            bitTarihInput.value = basTarihInput.value;
        }
    });
        // Form verisini n8n Webhook düğümüne gönderen fonksiyon
        async function gorevKaydet() {
            const taskValue = document.getElementById('taskInput').value;
            const basTarihValue = document.getElementById('basTarihInput').value;
            const bitTarihValue = document.getElementById('bitTarihInput').value;
            const kisiValue = document.getElementById('kisiInput').value;
            const yerValue = document.getElementById('yerInput').value;
            const epostaValue = document.getElementById('epostaInput').value;
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('statusMsg');

            if (!taskValue) {
                alert("Lütfen bir görev açıklaması girin.");
                return;
            }

            btn.innerText = "Kaydediliyor...";
            btn.disabled = true;

            try {
                // BURAYA n8n'de oluşturduğun yeni WEBHOOK URL'sini yapıştır
                const response = await fetch('https://pond-virtual-blair-packaging.trycloudflare.com/webhook/yeni-gorev', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify({ 
                        task: taskValue,
                        basTarih: basTarihValue,
                        bitTarih: bitTarihValue,
                        kisi: kisiValue,
                        yer: yerValue,
                        eposta: epostaValue 
                    })
                });

                if (response.ok) {
                    msg.style.display = 'block';
                    document.getElementById('taskInput').value = '';
                    setTimeout(() => { msg.style.display = 'none'; }, 3000);
                } else {
                    alert("Bir sorun oluştu. n8n'den hata döndü.");
                }
            } catch (error) {
                alert("Bağlantı hatası! Ngrok veya n8n çalışıyor mu?");
                console.error(error);
            } finally {
                btn.innerText = "Görevi Sisteme Kaydet";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
